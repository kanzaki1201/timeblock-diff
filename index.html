<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Timeblocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #1a1a1a; font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect, useMemo } = React;

const HOUR_HEIGHT = 32;
const START_HOUR = 6;
const END_HOUR = 23;
const TOTAL_HOURS = END_HOUR - START_HOUR;
const MIN_BLOCK_MINUTES = 15;
const LS_DATA = "tb_data";
const LS_CATS = "tb_cats";

const DEFAULT_CATEGORIES = [
  { id: "deep", label: "Deep Work", color: "#2D5A3D", bg: "#E8F5E9" },
  { id: "admin", label: "Admin", color: "#5A4B2D", bg: "#FFF8E1" },
  { id: "meeting", label: "Meeting", color: "#2D3E5A", bg: "#E3F2FD" },
  { id: "personal", label: "Personal", color: "#5A2D4B", bg: "#FCE4EC" },
  { id: "break", label: "Break", color: "#4A4A4A", bg: "#F5F5F5" },
  { id: "creative", label: "Creative", color: "#4B2D5A", bg: "#F3E5F5" },
  { id: "exercise", label: "Exercise", color: "#2D5A56", bg: "#E0F2F1" },
  { id: "learn", label: "Learning", color: "#5A3D2D", bg: "#FBE9E7" },
];

const PRESET_COLORS = [
  { color: "#2D5A3D", bg: "#E8F5E9" },
  { color: "#5A4B2D", bg: "#FFF8E1" },
  { color: "#2D3E5A", bg: "#E3F2FD" },
  { color: "#5A2D4B", bg: "#FCE4EC" },
  { color: "#4A4A4A", bg: "#F5F5F5" },
  { color: "#4B2D5A", bg: "#F3E5F5" },
  { color: "#2D5A56", bg: "#E0F2F1" },
  { color: "#5A3D2D", bg: "#FBE9E7" },
  { color: "#8B4513", bg: "#FFF3E0" },
  { color: "#1B5E20", bg: "#E8F5E9" },
  { color: "#4A148C", bg: "#F3E5F5" },
  { color: "#B71C1C", bg: "#FFEBEE" },
];

function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}

const snap = (minutes) => Math.round(minutes / MIN_BLOCK_MINUTES) * MIN_BLOCK_MINUTES;
const yToMinutes = (y) => snap(Math.max(0, (y / HOUR_HEIGHT) * 60));
const minutesToY = (m) => (m / 60) * HOUR_HEIGHT;
const formatTime = (totalMin) => {
  const h = Math.floor(totalMin / 60) + START_HOUR;
  const m = totalMin % 60;
  const period = h >= 12 ? "PM" : "AM";
  const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${h12}:${m.toString().padStart(2, "0")} ${period}`;
};
const formatDuration = (min) => {
  if (min < 60) return `${min}m`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
};
const dateKey = (d) => d.toISOString().split("T")[0];
const isSameDay = (a, b) => dateKey(a) === dateKey(b);
const uid = () => Math.random().toString(36).slice(2, 9);

function TimeblockTracker() {
  const [data, setData] = useState(() => loadJSON(LS_DATA, {}));
  const [currentDate, setCurrentDate] = useState(new Date());
  const [activeTab, setActiveTab] = useState("plan");
  const [selectedCategory, setSelectedCategory] = useState("deep");
  const [categories, setCategories] = useState(() => loadJSON(LS_CATS, DEFAULT_CATEGORIES));
  const [showCatManager, setShowCatManager] = useState(false);

  // Persist to localStorage
  useEffect(() => { localStorage.setItem(LS_DATA, JSON.stringify(data)); }, [data]);
  useEffect(() => { localStorage.setItem(LS_CATS, JSON.stringify(categories)); }, [categories]);

  const key = dateKey(currentDate);
  const dayData = data[key] || { planned: [], actual: [] };

  const updateDayData = useCallback(
    (updater) => {
      setData((prev) => {
        const current = prev[key] || { planned: [], actual: [] };
        return { ...prev, [key]: updater(current) };
      });
    },
    [key]
  );

  const prevDay = () => { const d = new Date(currentDate); d.setDate(d.getDate() - 1); setCurrentDate(d); };
  const nextDay = () => { const d = new Date(currentDate); d.setDate(d.getDate() + 1); setCurrentDate(d); };
  const goToday = () => setCurrentDate(new Date());

  const formatDateHeader = (d) => {
    const label = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    return isSameDay(d, new Date()) ? `${label} — Today` : label;
  };

  const exportJSON = () => {
    const exportData = { version: 1, exportedAt: new Date().toISOString(), categories, blocks: data };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = `timeblocks-${dateKey(new Date())}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  const importJSON = () => {
    const input = document.createElement("input"); input.type = "file"; input.accept = ".json";
    input.onchange = (e) => {
      const file = e.target.files?.[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (parsed.blocks) setData(parsed.blocks);
          if (parsed.categories) setCategories(parsed.categories);
        } catch { alert("Invalid JSON file"); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  return (
    <div style={S.app}>
      <header style={S.header}>
        <div style={S.titleRow}>
          <h1 style={S.title}>Timeblocks</h1>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <button onClick={exportJSON} style={S.iconBtn} title="Export JSON">↓</button>
            <button onClick={importJSON} style={S.iconBtn} title="Import JSON">↑</button>
            <div style={S.tabs}>
              {[["plan", "Plan"], ["stats", "Stats"]].map(([id, label]) => (
                <button key={id} onClick={() => setActiveTab(id)}
                  style={{ ...S.tab, ...(activeTab === id ? S.tabActive : {}) }}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </div>
        <div style={S.dateNav}>
          <button onClick={prevDay} style={S.navBtn}>←</button>
          <button onClick={goToday} style={S.todayBtn}>{formatDateHeader(currentDate)}</button>
          <button onClick={nextDay} style={S.navBtn}>→</button>
        </div>
      </header>

      {activeTab === "plan" && (
        <PlanView
          dayData={dayData} updateDayData={updateDayData}
          selectedCategory={selectedCategory} setSelectedCategory={setSelectedCategory}
          categories={categories} setCategories={setCategories}
          showCatManager={showCatManager} setShowCatManager={setShowCatManager}
        />
      )}
      {activeTab === "stats" && <StatsView data={data} currentDate={currentDate} categories={categories} />}
    </div>
  );
}

/* ── Category Picker + Manager ── */

function CategoryPicker({ selected, onSelect, categories, onEditClick }) {
  return (
    <div style={S.categoryPicker}>
      {categories.map((c) => (
        <button key={c.id} onClick={() => onSelect(c.id)}
          style={{ ...S.catBtn, background: selected === c.id ? c.color : c.bg,
            color: selected === c.id ? "#fff" : c.color, borderColor: c.color }}>
          {c.label}
        </button>
      ))}
      <button onClick={onEditClick} style={S.editCatBtn} title="Edit categories">⚙</button>
    </div>
  );
}

function CategoryManager({ categories, setCategories, onClose }) {
  const [newLabel, setNewLabel] = useState("");
  const [newColorIdx, setNewColorIdx] = useState(0);
  const [editingId, setEditingId] = useState(null);
  const [editLabel, setEditLabel] = useState("");

  const addCategory = () => {
    const label = newLabel.trim();
    if (!label) return;
    const preset = PRESET_COLORS[newColorIdx % PRESET_COLORS.length];
    setCategories((prev) => [...prev, { id: uid(), label, color: preset.color, bg: preset.bg }]);
    setNewLabel("");
    setNewColorIdx((i) => i + 1);
  };

  const startEdit = (cat) => { setEditingId(cat.id); setEditLabel(cat.label); };
  const saveEdit = (id) => {
    const label = editLabel.trim();
    if (label) setCategories((prev) => prev.map((c) => (c.id === id ? { ...c, label } : c)));
    setEditingId(null);
  };

  return (
    <div style={S.catManager}>
      <div style={S.catManagerHeader}>
        <span style={S.catManagerTitle}>Categories</span>
        <button onClick={onClose} style={S.catManagerClose}>✕</button>
      </div>
      <div style={S.catList}>
        {categories.map((c) => (
          <div key={c.id} style={S.catItem}>
            <span style={{ ...S.catDot, background: c.color }} />
            {editingId === c.id ? (
              <input value={editLabel} onChange={(e) => setEditLabel(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && saveEdit(c.id)}
                onBlur={() => saveEdit(c.id)} autoFocus style={S.catEditInput} />
            ) : (
              <span style={S.catItemLabel} onClick={() => startEdit(c)}>{c.label}</span>
            )}
            <button onClick={() => setCategories((p) => p.filter((x) => x.id !== c.id))}
              style={S.catRemoveBtn}>×</button>
          </div>
        ))}
      </div>
      <div style={S.catAddRow}>
        <div style={S.catColorPicker}>
          {PRESET_COLORS.map((p, i) => (
            <button key={i} onClick={() => setNewColorIdx(i)}
              style={{ ...S.catColorDot, background: p.color,
                outline: newColorIdx === i ? "2px solid #fff" : "none", outlineOffset: 1 }} />
          ))}
        </div>
        <div style={S.catAddInputRow}>
          <input value={newLabel} onChange={(e) => setNewLabel(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addCategory()}
            placeholder="New category..." style={S.catAddInput} />
          <button onClick={addCategory} style={S.catAddSubmit}>Add</button>
        </div>
      </div>
    </div>
  );
}

/* ── Compact Interactive Timeline ── */

function CompactTimeline({ blocks, onCreateBlock, onDeleteBlock, onUpdateBlock, selectedCategory, label, categories }) {
  const ref = useRef(null);
  const [creating, setCreating] = useState(null);
  const [resizing, setResizing] = useState(null);
  const creatingRef = useRef(null);
  const resizingRef = useRef(null);
  useEffect(() => { creatingRef.current = creating; }, [creating]);
  useEffect(() => { resizingRef.current = resizing; }, [resizing]);

  const getY = useCallback((e) => {
    if (!ref.current) return 0;
    const rect = ref.current.getBoundingClientRect();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return clientY - rect.top;
  }, []);

  const handlePointerDown = useCallback((e) => {
    if (e.target.closest("[data-block]") || e.target.closest("[data-resize]")) return;
    e.preventDefault();
    const startMin = yToMinutes(getY(e));
    setCreating({ startMin, currentMin: startMin });
  }, [getY]);

  useEffect(() => {
    if (!creating) return;
    const move = (e) => { e.preventDefault(); setCreating((p) => p ? { ...p, currentMin: yToMinutes(getY(e)) } : null); };
    const up = () => {
      const c = creatingRef.current;
      if (c) {
        const s = Math.min(c.startMin, c.currentMin), end = Math.max(c.startMin, c.currentMin);
        if (end - s >= MIN_BLOCK_MINUTES) onCreateBlock({ id: uid(), start: s, end, category: selectedCategory, label: "" });
      }
      setCreating(null);
    };
    window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", move, { passive: false }); window.addEventListener("touchend", up);
    return () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up);
      window.removeEventListener("touchmove", move); window.removeEventListener("touchend", up); };
  }, [creating, getY, onCreateBlock, selectedCategory]);

  const startResize = useCallback((e, blockId, edge) => {
    e.preventDefault(); e.stopPropagation();
    const block = blocks.find((b) => b.id === blockId);
    if (block) setResizing({ blockId, edge, origStart: block.start, origEnd: block.end });
  }, [blocks]);

  useEffect(() => {
    if (!resizing) return;
    const move = (e) => {
      e.preventDefault();
      const min = yToMinutes(getY(e)), r = resizingRef.current;
      if (!r) return;
      if (r.edge === "top") onUpdateBlock(r.blockId, { start: Math.min(min, r.origEnd - MIN_BLOCK_MINUTES) });
      else onUpdateBlock(r.blockId, { end: Math.max(min, r.origStart + MIN_BLOCK_MINUTES) });
    };
    const up = () => setResizing(null);
    window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", move, { passive: false }); window.addEventListener("touchend", up);
    return () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up);
      window.removeEventListener("touchmove", move); window.removeEventListener("touchend", up); };
  }, [resizing, getY, onUpdateBlock]);

  const ghost = creating ? (() => {
    const s = Math.min(creating.startMin, creating.currentMin), e = Math.max(creating.startMin, creating.currentMin);
    return e - s >= MIN_BLOCK_MINUTES ? { start: s, end: e } : null;
  })() : null;

  return (
    <div style={S.tlCol}>
      <div style={S.tlLabel}>{label}</div>
      <div ref={ref} style={{ ...S.tl, height: TOTAL_HOURS * HOUR_HEIGHT }}
        onMouseDown={handlePointerDown} onTouchStart={handlePointerDown}>
        {Array.from({ length: TOTAL_HOURS }, (_, i) => (
          <div key={i} style={{ ...S.hourLine, top: i * HOUR_HEIGHT }}>
            <span style={S.hourText}>{(() => { const h = i + START_HOUR; return `${h > 12 ? h - 12 : h}${h >= 12 ? "p" : "a"}`; })()}</span>
          </div>
        ))}
        {blocks.map((block) => {
          const cat = categories.find((c) => c.id === block.category) || categories[0];
          const dur = block.end - block.start;
          return (
            <div key={block.id} data-block="1" style={{ ...S.block, top: minutesToY(block.start),
              height: minutesToY(dur), background: cat.bg, borderLeft: `3px solid ${cat.color}` }}>
              <div data-resize="1" style={S.resizeTop} onMouseDown={(e) => startResize(e, block.id, "top")} onTouchStart={(e) => startResize(e, block.id, "top")} />
              <div style={S.blockInner}>
                <span style={{ fontSize: 9, fontWeight: 600, color: cat.color, lineHeight: 1 }}>{cat.label}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  <span style={{ fontSize: 8, color: cat.color, opacity: 0.7, fontFamily: "'JetBrains Mono', monospace" }}>
                    {formatDuration(dur)}
                  </span>
                  <button data-block="1" onClick={(e) => { e.stopPropagation(); onDeleteBlock(block.id); }}
                    style={S.delBtn}>×</button>
                </div>
              </div>
              <div data-resize="1" style={S.resizeBot} onMouseDown={(e) => startResize(e, block.id, "bottom")} onTouchStart={(e) => startResize(e, block.id, "bottom")} />
            </div>
          );
        })}
        {ghost && (
          <div style={{ ...S.block, opacity: 0.5, pointerEvents: "none", top: minutesToY(ghost.start),
            height: minutesToY(ghost.end - ghost.start),
            borderLeft: `3px solid ${categories.find((c) => c.id === selectedCategory)?.color || "#666"}`,
            background: categories.find((c) => c.id === selectedCategory)?.bg || "#eee" }} />
        )}
      </div>
    </div>
  );
}

/* ── Plan View (timelines + diff table) ── */

function PlanView({ dayData, updateDayData, selectedCategory, setSelectedCategory, categories, setCategories, showCatManager, setShowCatManager }) {
  const createBlock = useCallback((lane) => (block) => updateDayData((d) => ({ ...d, [lane]: [...d[lane], block] })), [updateDayData]);
  const deleteBlock = useCallback((lane) => (id) => updateDayData((d) => ({ ...d, [lane]: d[lane].filter((b) => b.id !== id) })), [updateDayData]);
  const updateBlock = useCallback((lane) => (id, updates) => updateDayData((d) => ({ ...d, [lane]: d[lane].map((b) => (b.id === id ? { ...b, ...updates } : b)) })), [updateDayData]);

  const planned = dayData.planned || [];
  const actual = dayData.actual || [];

  const categoryTotals = useMemo(() => {
    const totals = {};
    categories.forEach((c) => {
      const pMin = planned.filter((b) => b.category === c.id).reduce((s, b) => s + (b.end - b.start), 0);
      const aMin = actual.filter((b) => b.category === c.id).reduce((s, b) => s + (b.end - b.start), 0);
      if (pMin > 0 || aMin > 0) totals[c.id] = { planned: pMin, actual: aMin, diff: aMin - pMin };
    });
    return totals;
  }, [planned, actual, categories]);

  const totalPlanned = planned.reduce((s, b) => s + (b.end - b.start), 0);
  const totalActual = actual.reduce((s, b) => s + (b.end - b.start), 0);
  const hasDiff = Object.keys(categoryTotals).length > 0;

  return (
    <div style={{ paddingTop: 12 }}>
      <CategoryPicker selected={selectedCategory} onSelect={setSelectedCategory}
        categories={categories} onEditClick={() => setShowCatManager((v) => !v)} />
      {showCatManager && <CategoryManager categories={categories} setCategories={setCategories} onClose={() => setShowCatManager(false)} />}
      <div style={S.instruction}>
        Drag to create blocks · drag edges to resize · <strong>{categories.find((c) => c.id === selectedCategory)?.label}</strong>
      </div>
      <div style={S.timelinesRow}>
        <CompactTimeline blocks={planned} onCreateBlock={createBlock("planned")} onDeleteBlock={deleteBlock("planned")}
          onUpdateBlock={updateBlock("planned")} selectedCategory={selectedCategory} label="Planned" categories={categories} />
        <CompactTimeline blocks={actual} onCreateBlock={createBlock("actual")} onDeleteBlock={deleteBlock("actual")}
          onUpdateBlock={updateBlock("actual")} selectedCategory={selectedCategory} label="Actual" categories={categories} />
      </div>

      {hasDiff && (
        <div style={S.diffTable}>
          <div style={S.diffHeader}>
            <span style={S.diffHCell}>Category</span>
            <span style={S.diffHCell}>Planned</span>
            <span style={S.diffHCell}>Actual</span>
            <span style={S.diffHCell}>Diff</span>
          </div>
          {Object.entries(categoryTotals).map(([catId, t]) => {
            const cat = categories.find((c) => c.id === catId);
            return (
              <div key={catId} style={S.diffRow}>
                <span style={{ ...S.diffCell, color: cat?.color, fontWeight: 500 }}>{cat?.label}</span>
                <span style={S.diffCell}>{formatDuration(t.planned)}</span>
                <span style={S.diffCell}>{formatDuration(t.actual)}</span>
                <span style={{ ...S.diffCell, fontFamily: "'JetBrains Mono', monospace",
                  color: t.diff > 0 ? "#e67e22" : t.diff < 0 ? "#c0392b" : "#888" }}>
                  {t.diff > 0 ? "+" : ""}{formatDuration(Math.abs(t.diff))}{t.diff < 0 ? " under" : t.diff > 0 ? " over" : ""}
                </span>
              </div>
            );
          })}
          <div style={{ ...S.diffRow, borderTop: "1px solid #444", marginTop: 4, paddingTop: 8 }}>
            <span style={{ ...S.diffCell, fontWeight: 600, color: "#ccc" }}>Total</span>
            <span style={{ ...S.diffCell, fontWeight: 600 }}>{formatDuration(totalPlanned)}</span>
            <span style={{ ...S.diffCell, fontWeight: 600 }}>{formatDuration(totalActual)}</span>
            <span style={{ ...S.diffCell, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace",
              color: totalActual - totalPlanned > 0 ? "#e67e22" : totalActual - totalPlanned < 0 ? "#c0392b" : "#888" }}>
              {totalActual - totalPlanned > 0 ? "+" : ""}{formatDuration(Math.abs(totalActual - totalPlanned))}
            </span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Stats View ── */

function StatsView({ data, currentDate, categories }) {
  const [mode, setMode] = useState("week");

  const days = useMemo(() => {
    const result = [];
    if (mode === "week") {
      const start = new Date(currentDate);
      start.setDate(start.getDate() - ((start.getDay() + 6) % 7));
      for (let i = 0; i < 7; i++) { const d = new Date(start); d.setDate(d.getDate() + i); result.push(d); }
    } else {
      for (let i = 6; i >= 0; i--) { const d = new Date(currentDate); d.setDate(d.getDate() - i); result.push(d); }
    }
    return result;
  }, [currentDate, mode]);

  const dayStats = useMemo(() => days.map((d) => {
    const dd = data[dateKey(d)] || { planned: [], actual: [] };
    const p = dd.planned.reduce((s, b) => s + (b.end - b.start), 0);
    const a = dd.actual.reduce((s, b) => s + (b.end - b.start), 0);
    return { date: d, label: d.toLocaleDateString("en-US", { weekday: "short" }),
      dayNum: d.getDate(), planned: p, actual: a,
      accuracy: p > 0 ? Math.round(Math.min(a / p, 2) * 100) : null };
  }), [days, data]);

  const catTotals = useMemo(() => {
    const totals = {};
    categories.forEach((c) => (totals[c.id] = { planned: 0, actual: 0 }));
    days.forEach((d) => {
      const dd = data[dateKey(d)] || { planned: [], actual: [] };
      dd.planned.forEach((b) => { if (totals[b.category]) totals[b.category].planned += b.end - b.start; });
      dd.actual.forEach((b) => { if (totals[b.category]) totals[b.category].actual += b.end - b.start; });
    });
    return Object.entries(totals).filter(([, v]) => v.planned > 0 || v.actual > 0);
  }, [days, data, categories]);

  const maxMin = Math.max(...dayStats.map((d) => Math.max(d.planned, d.actual)), 60);
  const hasData = dayStats.some((d) => d.planned > 0 || d.actual > 0);

  const rangeLabel = (() => {
    const fmt = (d) => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    return `${fmt(days[0])} – ${fmt(days[6])}`;
  })();

  if (!hasData) return (
    <div style={S.empty}><p style={S.emptyText}>No data for this range.</p><p style={S.emptySub}>Start adding blocks to see stats.</p></div>
  );

  return (
    <div style={{ paddingTop: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <h3 style={{ ...S.statsTitle, marginBottom: 0 }}>{rangeLabel}</h3>
        <div style={S.tabs}>
          {[["week", "This Week"], ["rolling", "Last 7 Days"]].map(([id, label]) => (
            <button key={id} onClick={() => setMode(id)}
              style={{ ...S.tab, ...(mode === id ? S.tabActive : {}), fontSize: 11, padding: "4px 10px" }}>
              {label}
            </button>
          ))}
        </div>
      </div>
      <div style={S.weekChart}>
        {dayStats.map((d, i) => (
          <div key={i} style={S.dayCol}>
            <div style={S.barGroup}>
              <div style={{ ...S.bar, height: `${(d.planned / maxMin) * 120}px`, background: "#2D5A3D44", border: "1px solid #2D5A3D88" }} />
              <div style={{ ...S.bar, height: `${(d.actual / maxMin) * 120}px`, background: "#2D5A3D" }} />
            </div>
            <span style={S.dayLabel}>{mode === "rolling" ? `${d.label} ${d.dayNum}` : d.label}</span>
            {d.accuracy !== null && (
              <span style={{ ...S.accLabel, color: d.accuracy >= 80 && d.accuracy <= 120 ? "#4CAF50" : d.accuracy > 120 ? "#e67e22" : "#c0392b" }}>
                {d.accuracy}%
              </span>
            )}
          </div>
        ))}
      </div>
      <div style={S.legend}>
        <span style={S.legendItem}><span style={{ ...S.legendDot, background: "#2D5A3D44", border: "1px solid #2D5A3D88" }} />Planned</span>
        <span style={S.legendItem}><span style={{ ...S.legendDot, background: "#2D5A3D" }} />Actual</span>
      </div>

      {catTotals.length > 0 && <>
        <h3 style={{ ...S.statsTitle, marginTop: 24 }}>By Category</h3>
        <div style={S.catStats}>
          {catTotals.map(([catId, totals]) => {
            const cat = categories.find((c) => c.id === catId);
            const mx = Math.max(totals.planned, totals.actual, 1);
            return (
              <div key={catId} style={S.statCatRow}>
                <span style={{ ...S.statCatLabel, color: cat?.color }}>{cat?.label}</span>
                <div style={S.statCatBars}>
                  <div style={S.barTrack}>
                    <div style={{ ...S.barFill, width: `${(totals.planned / mx) * 100}%`, background: cat?.bg, border: `1px solid ${cat?.color}44` }} />
                    <span style={S.barNum}>{formatDuration(totals.planned)}</span>
                  </div>
                  <div style={S.barTrack}>
                    <div style={{ ...S.barFill, width: `${(totals.actual / mx) * 100}%`, background: cat?.color }} />
                    <span style={{ ...S.barNum, color: "#aaa" }}>{formatDuration(totals.actual)}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </>}
    </div>
  );
}
